site_name: hodlbook
site_description: Crypto paper-trading portfolio ledger API, built on pydynantic single-table DynamoDB.
repo_url: https://github.com/robertruben98/hodlbook
repo_name: robertruben98/hodlbook

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: false
            members_order: source

nav:
  - Home: index.md
  - API reference: api.md
